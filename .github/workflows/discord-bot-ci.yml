name: CI — Lint, Static Analysis & Tests

on:
  push:
    branches: [main]
    paths:
      - "discord-bot/**"
  pull_request:
    branches: [main]
    paths:
      - "discord-bot/**"

defaults:
  run:
    working-directory: discord-bot

jobs:
  # -----------------------------------------------------------------------
  # Job 1 — Linting & Static Analysis
  # -----------------------------------------------------------------------
  lint:
    name: Lint & Static Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create config from example
        run: cp config-example.py config.py

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run flake8 (PEP 8 style check)
        run: flake8 bot.py config.py devices.py --max-line-length 100

      - name: Run mypy (static type analysis)
        run: mypy bot.py config.py devices.py --ignore-missing-imports

      - name: Run bandit (security analysis)
        run: bandit -r . --exclude ./tests -ll

  # -----------------------------------------------------------------------
  # Job 2 — Tests with Coverage
  # -----------------------------------------------------------------------
  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create config from example
        run: cp config-example.py config.py

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests with coverage
        run: |
          pytest tests/ -v \
            --cov=. \
            --cov-report=term-missing \
            --cov-fail-under=80
