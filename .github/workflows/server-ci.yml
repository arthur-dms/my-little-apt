name: CI — server — Lint, Static Analysis & Tests

on:
  push:
    branches: [main, 'feat/**', 'fix/**']
    paths:
      - "server/**"
  pull_request:
    branches: [main]
    paths:
      - "server/**"

defaults:
  run:
    working-directory: server

jobs:
  # -----------------------------------------------------------------------
  # Job 1 — Linting & Static Analysis
  # -----------------------------------------------------------------------
  lint:
    name: Lint & Static Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create config from example
        run: cp config-example.py config.py

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run flake8 (PEP 8 style check)
        run: flake8 server.py config.py command_handler.py models.py --max-line-length 100

      - name: Run mypy (static type analysis)
        run: mypy server.py config.py command_handler.py models.py --ignore-missing-imports

      - name: Run bandit (security analysis)
        run: bandit -r . --exclude ./tests -ll

  # -----------------------------------------------------------------------
  # Job 2 — Tests with Coverage
  # -----------------------------------------------------------------------
  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create config from example
        run: cp config-example.py config.py

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests with coverage
        run: |
          pytest tests/ -v \
            --cov=. \
            --cov-report=term-missing \
            --cov-fail-under=80

  # -----------------------------------------------------------------------
  # Job 3 — Dependency Audit (supply chain security)
  # -----------------------------------------------------------------------
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pip-audit

      - name: Run pip-audit (dependency vulnerability check)
        run: pip-audit
